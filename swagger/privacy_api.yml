  /api/v1/faqs:
    get:
      tags:
        - faqs
      summary: Get FAQs
      description: |
        Retrieve all frequently asked questions with answers.

        **Response format:** Standard success wrapper with data array
        **Fields returned:** id, question, answer
        **Authentication:** Required
      operationId: getFAQs
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      responses:
        "200":
          description: FAQ list retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FAQResponse"
              examples:
                faqs:
                  summary: Complete FAQ list response
                  value:
                    status: "ok"
                    data:
                      - id: "faq_dsar_001"
                        question: "What is a DSAR and what can I request?"
                        answer: "A **DSAR (Data Subject Access Request)** lets you ask an organization what personal data they hold about you, how they use it, who they share it with, and request actions like **access, deletion, correction, portability, or restriction** (depending on applicable law)."
                      - id: "faq_dsar_002"
                        question: "What do DSAR statuses mean in PrivcyAI?"
                        answer: "**Draft** (not submitted), **Submitted** (sent), **Acknowledged** (received), **In Review** (processing), **Need Info** (verification/details required), **Fulfilled** (completed), **Partially Fulfilled** (some items done), **Rejected** (refused), **Expired/No Response** (deadline passed without completion)."
                      - id: "faq_dsar_003"
                        question: "Why does a company ask for identity verification for a DSAR?"
                        answer: "Organizations may require verification to prevent unauthorized access to your personal data. PrivcyAI will show what they requested and helps you respond safely. Share only what's necessary and redact non-required fields when possible."
                      - id: "faq_dsar_004"
                        question: "What can I do if a company doesn't respond to my request?"
                        answer: "Use **Follow-up** to send a reminder. If there's still no response, you can escalate by sending a final notice and, where applicable, filing a complaint with the relevant privacy authority. PrivcyAI keeps the full timeline and evidence in one place."
                      - id: "faq_risk_001"
                        question: "What is the Privacy Risk Score in PrivcyAI?"
                        answer: "Your **Privacy Risk Score** is an estimate of privacy exposure based on signals like the types of data involved (e.g., financial/location), account footprint across services, request outcomes, and security posture indicators. It's meant to guide actions to reduce exposure."
                      - id: "faq_risk_002"
                        question: "How can I reduce my Privacy Risk Score?"
                        answer: "Start with high-impact steps: enable **MFA**, remove unused accounts, submit **deletion/opt-out** requests, limit app permissions, rotate passwords, and reduce data sharing/ads settings. PrivcyAI highlights actions with the biggest expected risk reduction."
                      - id: "faq_vault_001"
                        question: "What is the Privacy Vault and what does it store?"
                        answer: "The **Privacy Vault** helps you track accounts, linked identifiers (email/phone), consents, data categories, and DSAR timelines. You control what you add. You can update or remove items anytime."
                      - id: "faq_security_001"
                        question: "Is my data encrypted and who can access it?"
                        answer: "PrivcyAI uses encryption in transit (TLS) and encryption at rest for stored data. Access is limited to authorized systems and only when needed to deliver features (like sending a verification file to an organization). You can remove uploaded files after use."
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"

