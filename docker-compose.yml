services:
  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    container_name: "privcy-swagger-ui"
    ports:
      - ${SWAGGER_PORT:-80}:8080
    environment:
      SWAGGER_JSON: /docs/privacy_api.yml
    volumes:
      - ./swagger/privacy_api.yml:/docs/privacy_api.yml
    restart: unless-stopped
